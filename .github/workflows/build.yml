name: Build DevKit

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS
        run: |
          cd build/macos/Build/Products/Release
          zip -r DevKit-macOS.zip dev_tools_app.app

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevKit-macOS
          path: build/macos/Build/Products/Release/DevKit-macOS.zip

      - name: Upload macOS Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/macos/Build/Products/Release/DevKit-macOS.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath DevKit-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevKit-Windows
          path: DevKit-Windows.zip

      - name: Upload Windows Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DevKit-Windows.zip